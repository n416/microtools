<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装備データセレクター</title>
    <link rel="stylesheet" href="data-selector.css?v=5">
    <link rel="stylesheet" href="save-load.css?v=5">
    <link rel="stylesheet" href="simulator.css?v=5">
</head>

<body>
    <div class="header-container">
        <h1>装備データセレクター</h1>
        <div class="header-buttons">
            <button id="update-db-button" class="button-like">データベース更新</button>
            <a href="index.html" id="back-to-top-button" class="button-like">トップページに戻る</a>
            <button id="settings-button" class="button-like" style="background-color: #555; color: white;">⚙️</button>
        </div>
    </div>
    <div id="status">準備中...</div>

    <div id="filter-controls">
        <div class="filter-row" style="justify-content: flex-end; border-bottom: none; padding-bottom: 0;">
            <button id="column-settings-button" class="button-like">表示列を編集</button>
        </div>

        <div class="filter-section">
            <div class="filter-label">カテゴリ</div>
            <div class="category-tabs" id="category-tabs">
                <button class="category-tab active" data-category="all">すべて</button>
                <button class="category-tab" data-category="weapon">武器</button>
                <button class="category-tab" data-category="armor">防具</button>
                <button class="category-tab" data-category="accessory">アクセサリ</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-header">
                <div class="filter-label">ランク</div>
                <div class="filter-actions">
                    <button id="rank-select-all" class="text-button">全て選択</button>
                    <button id="rank-clear" class="text-button">クリア</button>
                </div>
            </div>
            <div id="rank-pills-container" class="pills-container"></div>
        </div>

        <div class="filter-section" id="type-filter-section">
            <div class="filter-header">
                <div class="filter-label">タイプ</div>
                <div class="filter-actions">
                    <button id="type-select-all" class="text-button">全て選択</button>
                    <button id="type-clear" class="text-button">クリア</button>
                </div>
            </div>
            <div id="type-pills-container" class="pills-container"></div>
        </div>
    </div>

    <div id="table-container">
        <table id="equipment-table">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal-overlay" class="hidden premium-modal-overlay">
        <div id="settings-modal" class="premium-modal">
            <div class="premium-modal-header">
                <h2 class="premium-modal-title"><span class="icon">⚙️</span> 設定</h2>
                <button id="settings-close-btn" class="premium-close-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="settings-content" class="premium-settings-content">
                <div class="premium-setting-card">
                    <div class="setting-header">
                        <div class="setting-title">
                            <h3>古代以上のみ表示</h3>
                            <p>古代、伝説、SPECIAL等級の装備のみをリストに表示します。</p>
                        </div>
                        <label class="premium-toggle">
                            <input type="checkbox" id="setting-ancient-only">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="premium-setting-card">
                    <div class="setting-header">
                        <div class="setting-title">
                            <h3>伝説は表示しない</h3>
                            <p>伝説等級の装備をリストから除外して非表示にします。</p>
                        </div>
                        <label class="premium-toggle">
                            <input type="checkbox" id="setting-hide-legendary">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="premium-setting-card">
                    <div class="setting-header">
                        <div class="setting-title">
                            <h3>カンパネラとアミュレッタは全て表示する</h3>
                            <p>装備枠を選択した際も、カンパネラとアミュレッタを暗くせずに常に表示します。</p>
                        </div>
                        <label class="premium-toggle">
                            <input type="checkbox" id="setting-always-show-special">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                
                <div class="premium-setting-card">
                    <div class="setting-header" style="margin-bottom: 15px;">
                        <div class="setting-title">
                            <h3>職選択 <span class="badge">複数選択可</span></h3>
                            <p>選択した職業で装備可能な武器のみを表示します。</p>
                        </div>
                    </div>
                    <div class="premium-pill-grid" id="setting-class-grid">
                        <label class="premium-pill">
                            <input type="checkbox" value="大剣">
                            <span class="pill-content">大剣</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="鈍器">
                            <span class="pill-content">鈍器</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="双剣">
                            <span class="pill-content">双剣</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="杖">
                            <span class="pill-content">杖</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="宝珠">
                            <span class="pill-content">宝珠</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="弓">
                            <span class="pill-content">弓</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="鎌">
                            <span class="pill-content">鎌</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="双拳銃">
                            <span class="pill-content">双拳銃</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="御剣">
                            <span class="pill-content">御剣</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="拳甲">
                            <span class="pill-content">拳甲</span>
                        </label>
                        <label class="premium-pill">
                            <input type="checkbox" value="洋弓銃">
                            <span class="pill-content">洋弓銃</span>
                        </label>
                    </div>
                </div>

                <div class="premium-setting-card">
                    <div class="setting-header">
                        <div class="setting-title">
                            <h3>チュートリアルをもう一度見る</h3>
                            <p>シミュレーターの基本的な使い方を再度確認します。</p>
                        </div>
                        <button id="reset-tutorial-btn" class="button-like" style="background-color: #007bff; color: white;">再開する</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="./db-setup.js"></script>
    <script type="module" src="./data-selector.js"></script>
    <script type="module" src="./save-load.js"></script>
</body>

</html>
