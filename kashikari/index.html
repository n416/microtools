<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>Modern Rental Calc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4f46e5; /* モダンなインディゴ */
            --primary-light: #eef2ff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --bg-color: #f9fafb;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            --input-bg: #f3f4f6;
        }

        body { 
            background-color: var(--bg-color); 
            padding: 20px 10px; 
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* --- モダンな入力フォーム --- */
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        
        input, select, .form-control, .form-select {
            background-color: var(--input-bg) !important;
            border: 1px solid transparent !important;
            border-radius: 12px !important;
            padding: 12px 16px !important;
            font-size: 16px !important;
            font-weight: 500;
            color: var(--text-main) !important;
            transition: all 0.2s ease;
        }
        
        input:focus, select:focus {
            background-color: #fff !important;
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1) !important;
        }

        /* --- モダンカード --- */
        .modern-card {
            background: #fff;
            border: none;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .modern-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .step-badge {
            background: var(--primary-color);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        /* --- 商品リスト --- */
        .product-item { 
            cursor: pointer; 
            background: #fff;
            border: 1px solid #e5e7eb; 
            border-radius: 16px;
            padding: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .product-item:active { 
            transform: scale(0.98); 
        }
        
        .product-item.selected { 
            border-color: var(--primary-color);
            background-color: var(--primary-light);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }
        
        /* 選択時のチェックマーク */
        .product-item.selected::after {
            content: "\F26B"; /* Bootstrap Icons Check */
            font-family: "bootstrap-icons";
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .prod-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .prod-meta { font-size: 0.8rem; color: var(--text-sub); }
        .prod-price { font-weight: 700; color: var(--text-main); font-size: 1rem; }
        
        .tag-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
        .tag-rental { background: #dbeafe; color: #1e40af; }
        .tag-sales { background: #fef3c7; color: #92400e; }

        /* --- 検索履歴タグ --- */
        .history-chip { 
            display: inline-flex;
            align-items: center;
            font-size: 0.8rem; 
            padding: 6px 12px;
            border-radius: 99px;
            background-color: #fff;
            border: 1px solid #e5e7eb;
            color: var(--text-main);
            transition: all 0.2s;
            margin-right: 6px;
            margin-bottom: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .history-chip.locked {
            background-color: var(--primary-light);
            border-color: #c7d2fe;
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .chip-text { cursor: pointer; margin-right: 8px; }
        .chip-actions { display: flex; gap: 8px; opacity: 0.6; }
        .chip-actions i:hover { opacity: 1; transform: scale(1.1); }

        /* --- 結果表示エリア --- */
        .result-card {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
            text-align: center;
            padding: 24px;
            position: sticky;
            bottom: 20px;
            z-index: 100;
        }
        
        .result-amount {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0;
            letter-spacing: -0.02em;
        }
        
        .result-detail {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            font-size: 0.85rem;
            margin-top: 10px;
            backdrop-filter: blur(5px);
        }

        /* スクロール最適化 */
        #productList {
            max-height: 300px; 
            overflow-y: auto;
            padding-right: 5px;
        }
        
        /* スクロールバーをおしゃれに */
        #productList::-webkit-scrollbar { width: 6px; }
        #productList::-webkit-scrollbar-track { background: transparent; }
        #productList::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 20px; }

    </style>
</head>
<body>

<div class="container p-0" style="max-width: 600px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <div>
            <h4 class="fw-bold mb-0" style="letter-spacing: -0.5px;">MedRent <span style="color: var(--primary-color);">Pro</span></h4>
            <small class="text-muted" style="font-size: 0.75rem;">スマート見積もりシステム</small>
        </div>
        <div class="bg-white rounded-circle shadow-sm p-2">
            <i class="bi bi-person-circle fs-5 text-secondary"></i>
        </div>
    </div>

    <div class="modern-card">
        <div class="modern-card-header">
            <span class="step-badge">STEP 1</span>
            <span class="card-title">条件設定</span>
        </div>
        <div class="p-3">
            <div class="mb-3">
                <label class="form-label">契約パターン</label>
                <select id="clientSelect" class="form-select" onchange="recalc()">
                    <option value="1.0">A社（通常：定価）</option>
                    <option value="0.9">B社（特別：10%OFF）</option>
                    <option value="0.8">C社（VIP：20%OFF）</option>
                </select>
            </div>
            
            <div class="row g-2">
                <div class="col-6">
                    <label class="form-label">開始日</label>
                    <input type="date" id="startDate" class="form-control" onchange="recalc()">
                </div>
                <div class="col-6">
                    <label class="form-label">終了日</label>
                    <input type="date" id="endDate" class="form-control" onchange="recalc()">
                </div>
            </div>
            <div class="mt-3 d-flex justify-content-end">
                <div id="daysDisplay" class="text-muted fw-bold" style="font-size: 0.8rem;">
                    <i class="bi bi-calendar-range me-1"></i> 期間: - 日
                </div>
            </div>
        </div>
    </div>

    <div class="modern-card">
        <div class="modern-card-header">
            <span class="step-badge">STEP 2</span>
            <span class="card-title">商品検索</span>
        </div>
        <div class="p-3">
            <div class="position-relative mb-3">
                <i class="bi bi-search position-absolute text-muted" style="top: 14px; left: 16px;"></i>
                <input type="text" id="searchInput" class="form-control" style="padding-left: 45px !important;" placeholder="キーワード (例: AED)" onkeyup="filterProducts()">
                <button class="btn position-absolute" style="top: 4px; right: 5px; color: #9ca3af;" onclick="clearSearch()"><i class="bi bi-x-circle-fill"></i></button>
            </div>

            <div id="historyTags" class="mb-3 d-flex flex-wrap"></div>
            
            <div id="productList" class="d-grid gap-2"></div>
        </div>
    </div>

    <div class="result-card">
        <div style="opacity: 0.9; font-size: 0.8rem; letter-spacing: 1px;">TOTAL ESTIMATE</div>
        <div id="resultArea">
            <div class="result-amount" style="font-size: 1.5rem; opacity: 0.8;">---</div>
            <div style="font-size: 0.8rem;">商品を選択してください</div>
        </div>
    </div>
    
    <div style="height: 20px;"></div>
</div>

<script>
    /* データとロジックは変更なし（デザインクラスのみ適用） */
    const products = [
        { id: 1, name: "CPAP AirSense 10", maker: "ResMed", price: 15000, type: "レンタル" },
        { id: 2, name: "CPAP DreamStation", maker: "Philips", price: 14000, type: "レンタル" },
        { id: 3, name: "AED LIFEPAK CR2", maker: "Stryker", price: 8000, type: "レンタル" },
        { id: 4, name: "AED ZOLL Plus", maker: "ZOLL", price: 7500, type: "レンタル" },
        { id: 5, name: "CPAP フルフェイスマスク", maker: "ResMed", price: 25000, type: "販売" },
        { id: 6, name: "AED 交換用パッド", maker: "Stryker", price: 12000, type: "販売" },
        { id: 7, name: "人工呼吸器 Trilogy Evo", maker: "Philips", price: 45000, type: "レンタル" },
        { id: 8, name: "パルスオキシメーター", maker: "Konica", price: 3000, type: "レンタル" },
        { id: 9, name: "ネブライザー", maker: "OMRON", price: 2000, type: "販売" },
        { id: 10, name: "酸素濃縮器 ハイサンソ", maker: "Teijin", price: 18000, type: "レンタル" },
    ];

    let selectedProductId = null;
    let searchHistory = JSON.parse(localStorage.getItem('demo_history_modern')) || [];

    window.onload = function() {
        const today = new Date();
        const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        document.getElementById('startDate').valueAsDate = today;
        document.getElementById('endDate').valueAsDate = endOfMonth;
        renderProducts(products);
        renderHistory();
        recalc();
    };

    function renderProducts(list) {
        const container = document.getElementById('productList');
        container.innerHTML = '';
        if(list.length === 0){
             container.innerHTML = '<div class="text-center p-4 text-muted" style="font-size: 0.9rem;">該当する商品がありません</div>';
             return;
        }
        list.forEach(p => {
            const div = document.createElement('div');
            // デザイン用のクラス構造に変更
            const badgeClass = p.type === 'レンタル' ? 'tag-rental' : 'tag-sales';
            div.className = 'product-item';
            div.onclick = function() { selectProduct(p.id, this); }; // onclick設定
            
            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <span class="tag-badge ${badgeClass} mb-1 d-inline-block">${p.type}</span>
                        <div class="prod-name">${p.name}</div>
                        <div class="prod-meta">${p.maker}</div>
                    </div>
                    <div class="text-end">
                        <div class="prod-price">¥${p.price.toLocaleString()}</div>
                        <small class="text-muted" style="font-size: 0.7rem;">/月(個)</small>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function addToHistory() {
        const inputVal = document.getElementById('searchInput').value.trim();
        if(!inputVal) return;

        const existingIndex = searchHistory.findIndex(item => item.text === inputVal);
        let isLocked = false;
        
        if (existingIndex > -1) {
            isLocked = searchHistory[existingIndex].locked;
            searchHistory.splice(existingIndex, 1);
        }

        searchHistory.unshift({ text: inputVal, locked: isLocked });

        if (searchHistory.length > 5) {
            let removed = false;
            for (let i = searchHistory.length - 1; i >= 0; i--) {
                if (!searchHistory[i].locked) {
                    searchHistory.splice(i, 1);
                    removed = true;
                    break;
                }
            }
            if (!removed && searchHistory.length > 6) { searchHistory.pop(); }
        }
        saveAndRender();
    }

    function removeHistory(index) {
        // イベントバブリング防止はHTML側で制御できないため、データ操作後に再描画
        searchHistory.splice(index, 1);
        saveAndRender();
    }

    function toggleLock(index) {
        searchHistory[index].locked = !searchHistory[index].locked;
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('demo_history_modern', JSON.stringify(searchHistory));
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyTags');
        container.innerHTML = '';
        if (searchHistory.length === 0) {
            container.innerHTML = '<span class="text-muted" style="font-size: 0.75rem; padding-left: 5px;">履歴なし</span>';
            return;
        }

        searchHistory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `history-chip ${item.locked ? 'locked' : ''}`;
            const lockIcon = item.locked ? 'bi-pin-angle-fill' : 'bi-pin-angle';
            
            // onclickイベントの伝播を防ぐため、HTML構造内で関数呼び出しを工夫
            div.innerHTML = `
                <span class="chip-text" onclick="applySearch('${item.text}')">${item.text}</span>
                <div class="chip-actions">
                    <i class="bi ${lockIcon}" onclick="toggleLock(${index})"></i>
                    <i class="bi bi-x-lg" onclick="removeHistory(${index})"></i>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function applySearch(text) {
        document.getElementById('searchInput').value = text;
        filterProducts();
    }

    function filterProducts() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const filtered = products.filter(p => 
            p.name.toLowerCase().includes(text) || 
            p.maker.toLowerCase().includes(text)
        );
        renderProducts(filtered);
    }
    
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        filterProducts();
    }

    function selectProduct(id, elem) {
        selectedProductId = id;
        document.querySelectorAll('.product-item').forEach(e => e.classList.remove('selected'));
        elem.classList.add('selected'); // 修正版のロジック適用
        
        addToHistory();
        recalc();
    }

    function recalc() {
        if (!selectedProductId) return;
        const product = products.find(p => p.id === selectedProductId);
        const rate = parseFloat(document.getElementById('clientSelect').value);
        const start = new Date(document.getElementById('startDate').value);
        const end = new Date(document.getElementById('endDate').value);
        
        const diffTime = end - start;
        const days = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        if (days <= 0) {
             document.getElementById('resultArea').innerHTML = '<div class="text-white-50">日付を確認してください</div>';
             return;
        }

        document.getElementById('daysDisplay').innerHTML = `<i class="bi bi-calendar-check text-primary"></i> 期間: ${days}日間`;

        let html = '';
        if (product.type === 'レンタル') {
            const basePrice = product.price;
            const isMonthly = days >= 30;
            const finalPrice = isMonthly ? (basePrice * rate) : Math.floor(basePrice * rate / 30 * days);
            
            html = `
                <div class="result-amount">¥${Math.round(finalPrice).toLocaleString()}</div>
                <div style="font-weight: 600;">${product.name}</div>
                <div class="result-detail">
                    単価: ¥${basePrice.toLocaleString()} × ${Math.round(rate*100)}%<br>
                    ${days}日利用 ${isMonthly ? '(月額上限)' : '(日割り適用)'}
                </div>
            `;
        } else {
            const price = product.price * rate;
            html = `
                <div class="result-amount">¥${price.toLocaleString()}</div>
                <div style="font-weight: 600;">${product.name}</div>
                <div class="result-detail">
                    定価: ¥${product.price.toLocaleString()} (買取)<br>
                    契約適用レート: ${Math.round(rate*100)}%
                </div>
            `;
        }
        document.getElementById('resultArea').innerHTML = html;
    }
</script>

</body>
</html>
