		  <tbody>
		    <tr>
		      <th align="right">Ｅメール：</th>

		    </tr>
		  </tbody>
		</table>

		<br /><br />

		<input type="submit" value="LOGIN" id="login" />
		</form>
		<br /><a href="/login/replacepasswordinput/">⇒パスワード再発行</a>

		<br /><br />

<script type="text/javascript"><!--
$(function(){
	$('#formtable').submit(function(event){
		var error;
		if(!$('#id').val().length){
			error = 'メールアドレスを入力してください。';
		}else if(!$('#pass').val().length){
			error = 'パスワードを入力してください。';
		}
		if(error){
			jqAlert(error, 'エラー');
			return event.preventDefault();
		}
	});
});
